<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Món Quà 12.1 - 8/3</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Dancing+Script:wght@700&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --book-w: min(320px, 85vw);
            --book-h: min(450px, 120vw);
            --pink: #ff4d6d;
        }

        /* Style cho thông báo xoay màn hình */
        .rotate-notice {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.98);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .rotate-notice.show {
            display: flex;
        }

        .rotate-icon {
            font-size: 100px;
            animation: rotatePhone 1.5s infinite ease;
            margin-bottom: 30px;
        }

        .rotate-text {
            font-family: 'Baloo 2', cursive;
            font-size: 28px;
            color: var(--pink);
            margin-bottom: 15px;
        }

        .rotate-subtext {
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            color: #ff8da1;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(90deg); }
            75% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        /* ===== BACKGROUND MÂY VÀ SAO ===== */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 1000px;
            box-shadow: 0 5px 15px rgba(255, 192, 203, 0.2);
            animation: floatCloud linear infinite;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(255, 192, 203, 0.2);
        }

        .cloud1 {
            width: 200px;
            height: 70px;
            top: 15%;
            left: -200px;
            animation-duration: 35s;
        }
        .cloud1::before {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 20px;
        }
        .cloud1::after {
            width: 120px;
            height: 120px;
            top: -60px;
            left: 80px;
        }

        .cloud2 {
            width: 250px;
            height: 80px;
            top: 45%;
            left: -250px;
            animation-duration: 45s;
            animation-delay: 5s;
        }
        .cloud2::before {
            width: 120px;
            height: 120px;
            top: -60px;
            left: 30px;
        }
        .cloud2::after {
            width: 140px;
            height: 140px;
            top: -70px;
            left: 100px;
        }

        .cloud3 {
            width: 180px;
            height: 60px;
            bottom: 20%;
            left: -180px;
            animation-duration: 30s;
            animation-delay: 2s;
        }
        .cloud3::before {
            width: 90px;
            height: 90px;
            top: -45px;
            left: 20px;
        }
        .cloud3::after {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 70px;
        }

        .cloud4 {
            width: 220px;
            height: 75px;
            top: 70%;
            left: -220px;
            animation-duration: 40s;
            animation-delay: 8s;
        }
        .cloud4::before {
            width: 110px;
            height: 110px;
            top: -55px;
            left: 25px;
        }
        .cloud4::after {
            width: 130px;
            height: 130px;
            top: -65px;
            left: 90px;
        }

        @keyframes floatCloud {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(calc(100vw + 300px));
            }
        }

        /* ===== SAO NHẤP NHÁY ===== */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff9e6;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffd9e6, 0 0 20px #ffb3c6;
            animation: twinkle 3s infinite ease-in-out;
            opacity: 0;
        }

        .star1 { width: 4px; height: 4px; top: 10%; left: 15%; animation-duration: 2s; }
        .star2 { width: 3px; height: 3px; top: 25%; left: 85%; animation-duration: 2.5s; animation-delay: 0.7s; }
        .star3 { width: 5px; height: 5px; top: 40%; left: 30%; animation-duration: 3s; animation-delay: 1.2s; }
        .star4 { width: 3px; height: 3px; top: 55%; left: 70%; animation-duration: 2.2s; animation-delay: 0.3s; }
        .star5 { width: 4px; height: 4px; top: 70%; left: 20%; animation-duration: 2.8s; animation-delay: 1.5s; }
        .star6 { width: 6px; height: 6px; top: 15%; left: 50%; animation-duration: 3.2s; animation-delay: 0.9s; }
        .star7 { width: 3px; height: 3px; top: 85%; left: 40%; animation-duration: 2.3s; animation-delay: 1.8s; }
        .star8 { width: 4px; height: 4px; top: 45%; left: 95%; animation-duration: 2.6s; animation-delay: 0.4s; }
        .star9 { width: 5px; height: 5px; top: 60%; left: 10%; animation-duration: 3.5s; animation-delay: 1.1s; }
        .star10 { width: 3px; height: 3px; top: 30%; left: 65%; animation-duration: 2.4s; animation-delay: 2s; }
        .star11 { width: 4px; height: 4px; top: 75%; left: 80%; animation-duration: 2.9s; animation-delay: 0.6s; }
        .star12 { width: 5px; height: 5px; top: 90%; left: 55%; animation-duration: 3.1s; animation-delay: 1.4s; }
        .star13 { width: 3px; height: 3px; top: 20%; left: 25%; animation-duration: 2.7s; animation-delay: 0.2s; }
        .star14 { width: 4px; height: 4px; top: 50%; left: 45%; animation-duration: 3.3s; animation-delay: 1.9s; }
        .star15 { width: 6px; height: 6px; top: 35%; left: 5%; animation-duration: 2.1s; animation-delay: 0.8s; }

        @keyframes twinkle {
            0%, 100% { 
                opacity: 0;
                transform: scale(0.5);
            }
            50% { 
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            :root { 
                --book-w: min(85vw, 500px); 
                --book-h: calc(min(85vw, 500px) * 1.4);
            }
            
            .page-text { 
                font-size: 1rem !important; 
                padding: 8px !important;
            }
            .front, .back {
                padding: 10px !important;
            }
            
            .cloud1 { width: 150px; height: 50px; }
            .cloud1::before { width: 70px; height: 70px; top: -35px; }
            .cloud1::after { width: 85px; height: 85px; top: -42px; }
            
            .cloud2 { width: 180px; height: 60px; }
            .cloud2::before { width: 85px; height: 85px; top: -42px; }
            .cloud2::after { width: 100px; height: 100px; top: -50px; }
        }

        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(-45deg, #fff0f0, #ffdde1, #ffd1d1, #fff5f5);
            background-size: 400% 400%;
            animation: pinkGradient 8s ease infinite;
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            position: fixed;
            inset: 0;
        }

        @keyframes pinkGradient { 
            0%, 100% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
        }

        /* SCENE 1: BẮN TIM - Font Baloo to hơn */
        #scene-1 { 
            position: absolute; 
            inset: 0; 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.5s ease;
            opacity: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .bubble-text { 
            font-family: 'Baloo 2', cursive; 
            font-size: min(12vw, 90px);
            font-weight: 800;
            color: var(--pink); 
            opacity: 0; 
            transition: opacity 0.8s;
            text-align: center;
            padding: 0 15px;
            text-shadow: 3px 3px 6px rgba(255, 77, 109, 0.2);
            max-width: 100%;
            word-break: break-word;
            position: relative;
            z-index: 102;
            letter-spacing: 2px;
            line-height: 1.2;
        }
        
        .cat-container { 
            position: absolute; 
            bottom: 15%; 
            left: 10%; 
            z-index: 101;
            max-width: 25%;
        }
        
        .cat-img { 
            height: auto;
            width: 100%;
            max-height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }
        
        .heart { 
            position: absolute; 
            color: var(--pink); 
            font-size: clamp(16px, 4vw, 24px);
            pointer-events: none;
            z-index: 200;
            animation: fly 0.8s forwards; 
            transform: translate(-50%, -50%);
        }
        
        @keyframes fly { 
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(2); opacity: 0; } 
        }

        /* SCENE 2: THIỆP - ĐÃ BỎ GÁY SÁCH */
        #scene-2 { 
            position: absolute; 
            inset: 0; 
            display: none; 
            opacity: 0; 
            align-items: center; 
            justify-content: center; 
            perspective: 2500px; 
            z-index: 50; 
            transition: opacity 0.6s ease;
            width: 100%;
            height: 100%;
            padding: 5px;
            overflow: hidden;
        }
        
        .book-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 51;
            overflow: hidden;
        }

        .book {
            position: relative;
            width: var(--book-w);
            height: var(--book-h);
            transform-style: preserve-3d;
            transform: translateX(calc(var(--book-w) / 2)) rotateX(2deg);
            max-width: 100%;
            filter: drop-shadow(0 20px 30px rgba(255, 77, 109, 0.2));
        }

        .page {
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: -100%;
            transform-origin: right center; 
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .page.flipped { 
            transform: rotateY(-180deg) translateZ(1px); 
        }

        .front, .back {
            position: absolute; 
            width: 100%; 
            height: 100%;
            backface-visibility: hidden; 
            border-radius: 5px 15px 15px 5px;
            background: white; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            padding: 15px; 
            box-sizing: border-box; 
            border: 2px solid #ffe4e4;
            box-shadow: 
                inset -15px 0 30px rgba(255, 200, 200, 0.1),
                0 5px 15px rgba(255, 77, 109, 0.1);
            overflow: hidden;
        }
        
        .back { 
            transform: rotateY(180deg); 
            border-radius: 15px 5px 5px 15px; 
            box-shadow: 
                inset 15px 0 30px rgba(255, 200, 200, 0.1),
                0 5px 15px rgba(255, 77, 109, 0.1);
        }
        
        .cover-front { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%) !important; 
            color: white; 
            font-size: clamp(1.2rem, 4vw, 2rem);
            text-align: center;
            font-family: 'Dancing Script', cursive;
            padding: 8px !important;
            border: 2px solid #fff !important;
        }

        .cover-front h2 {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .page-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 8px; 
        }

        /* Container cho ảnh và số trang */
        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Style cho phần text - KHÔNG CÓ THANH CUỘN */
        .page-text { 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(1rem, 3.5vw, 1.5rem); 
            color: var(--pink); 
            text-align: center; 
            word-break: break-word;
            padding: 15px;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            margin: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.1);
        }

        /* Style cho số trang - chỉ hiện 1 cái */
        .page-number {
            position: absolute;
            bottom: 8px;
            right: 15px;
            font-size: 14px;
            color: #ff99aa;
            font-family: 'Arial', sans-serif;
            background: rgba(255, 255, 255, 0.8);
            padding: 3px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
            font-weight: bold;
            border: 1px solid #ffb6c1;
            pointer-events: none;
        }

        /* MŨI TÊN */
        .nav-arrow {
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            font-size: clamp(2rem, 8vw, 3rem); 
            color: white; 
            cursor: pointer;
            z-index: 200; 
            user-select: none; 
            transition: all 0.3s;
            padding: 8px;
            -webkit-tap-highlight-color: transparent;
            background: var(--pink);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            border: 2px solid white;
        }
        
        .nav-arrow:active { 
            transform: translateY(-50%) scale(0.9); 
            background: #ff3355;
            box-shadow: 0 2px 10px rgba(255, 77, 109, 0.6);
        }
        
        .arrow-left { 
            left: 10px; 
            display: none; 
        }
        
        .arrow-right { 
            right: 10px; 
            animation: arrowBounce 1s infinite alternate; 
        }
        
        @keyframes arrowBounce { 
            from { transform: translateY(-50%) translateX(0); } 
            to { transform: translateY(-50%) translateX(8px); } 
        }

        /* Fix cho màn hình siêu nhỏ */
        @media (max-width: 380px) and (orientation: landscape) {
            .nav-arrow {
                width: 35px;
                height: 35px;
                font-size: 1.5rem;
            }
            
            .front, .back {
                padding: 6px !important;
            }
            
            .page-text {
                font-size: 0.85rem !important;
                padding: 10px;
            }
            
            .cover-front h2 {
                font-size: 1rem !important;
            }
            
            .cat-container {
                max-width: 20%;
            }
            
            .page-number {
                font-size: 12px;
                padding: 2px 8px;
            }
            
            .bubble-text {
                font-size: min(10vw, 70px) !important;
            }
        }
    </style>
</head>
<body>
    <!-- BACKGROUND MÂY TRÔI -->
    <div class="clouds">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
    </div>

    <!-- SAO NHẤP NHÁY -->
    <div class="stars">
        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>
        <div class="star star8"></div>
        <div class="star star9"></div>
        <div class="star star10"></div>
        <div class="star star11"></div>
        <div class="star star12"></div>
        <div class="star star13"></div>
        <div class="star star14"></div>
        <div class="star star15"></div>
    </div>

    <!-- Thông báo xoay màn hình -->
    <div class="rotate-notice" id="rotateNotice">
        <div class="rotate-icon">📱</div>
        <div class="rotate-text">Xoay ngang màn hình để xem tiếp nhé!</div>
        <div class="rotate-subtext">Tụi tớ sẽ tự reload khi bạn xoay xong ❤️</div>
    </div>

    <!-- SCENE 1: BẮN TIM -->
    <div id="scene-1">
        <h1 class="bubble-text" id="target">Happy Women's Day</h1>
        <div class="cat-container" id="cat">
            <!-- PASTE ẢNH CON MÈO CỦA BẠN VÀO ĐÂY -->
            <img src="cat_clean.png" 
                 class="cat-img" 
                 alt="Cat"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/1864/1864514.png'">
        </div>
    </div>

    <!-- SCENE 2: THIỆP -->
    <div id="scene-2">
        <div class="nav-arrow arrow-left" id="btn-left">❮</div>
        <div class="book-container">
            <div class="book" id="book-ui"></div>
        </div>
        <div class="nav-arrow arrow-right" id="btn-right">❯</div>
    </div>

    <script>
        // ===== DỮ LIỆU THIỆP =====
        const dataThiep = [
            { anh: "anh1.jpg", chuc: "🌸 Chúc các cậu ngày 8/3 luôn xinh đẹp và rạng rỡ nhé!" },
            { anh: "anh2.jpg", chuc: "🌼 Nụ cười của các cậu luôn là điều tuyệt vời nhất." },
            { anh: "anh3.jpg", chuc: "🌺 Cảm ơn vì đã luôn ở bên lớp những lúc vui lẫn buồn." },
            { anh: "anh4.jpg", chuc: "🌷 Các cậu hãy luôn là chính mình, vì các cậu rất đặc biệt." },
            { anh: "anh5.jpg", chuc: "🌹 Tụi tớ mong mọi điều may mắn và tốt đẹp nhất sẽ đến với các cậu." },
            { anh: "anh6.jpg", chuc: "🌸 Hãy Cùng nhau tạo thêm thật nhiều kỷ niệm đẹp thời học sinh cấp 3 nha!" },
            { anh: "anh7.jpg", chuc: "🌼 Hy vọng mọi ước mơ của các cậu sẽ chấp cánh cho các cậu bay cao thành công" },
            { anh: "anh8.jpg", chuc: "🌺 Dù có chuyện gì, 12.1 vẫn luôn ủng hộ các cậu." },
            { anh: "anh9.jpg", chuc: "🌷 Happy Women's Day! 12.1 with love! ❤️" },
            { anh: "anh10.jpg", chuc: "🎀 Hết rùi ❤️" }
        ];

        // Biến lưu trạng thái
        let orientationChanged = false;

        // Kiểm tra hướng màn hình và reload nếu cần
        function checkOrientationAndReload() {
            const notice = document.getElementById('rotateNotice');
            
            if (window.innerHeight > window.innerWidth) {
                notice.classList.add('show');
                orientationChanged = true;
            } else {
                if (orientationChanged) {
                    window.location.reload();
                } else {
                    notice.classList.remove('show');
                }
            }
        }

        window.addEventListener('resize', checkOrientationAndReload);
        window.addEventListener('orientationchange', checkOrientationAndReload);

        // Xây dựng sách
        function buildBook() {
            const bookUI = document.getElementById('book-ui');
            if (!bookUI) return;
            
            let html = '';
            
            // Bìa trước
            html += `<div class="page" style="z-index: 25">
                        <div class="front cover-front">
                            <h2 style="font-size: clamp(1.2rem, 5vw, 2.2rem); margin:0; line-height:1.3;">
                                12.1<br>Gửi Các Bạn Nữ<br>🌸
                            </h2>
                        </div>
                        <div class="back">
                            <div class="image-container">
                                <img src="${dataThiep[0].anh}" class="page-img" onerror="this.src='https://via.placeholder.com/300x400/ffb6c1/ffffff?text=Anh+1'">
                                <div class="page-number">1/10</div>
                            </div>
                        </div>
                    </div>`;

            // Các trang trong
            for(let i = 0; i < dataThiep.length; i++) {
                let z = 24 - i;
                let pageNumber = i + 1;
                
                let backContent = "";
                if (i < dataThiep.length - 1) {
                    backContent = `
                        <div class="image-container">
                            <img src="${dataThiep[i+1].anh}" class="page-img" onerror="this.src='https://via.placeholder.com/300x400/ffb6c1/ffffff?text=Anh+${i+2}'">
                            <div class="page-number">${i+2}/10</div>
                        </div>
                    `;
                } else {
                    backContent = `
                        <div class="cover-front" style="background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%) !important;">
                            <h2 style="font-size: clamp(1.2rem, 5vw, 2rem);">
                                The End<br>❤️<br>Cảm ơn các bạn!
                            </h2>
                        </div>
                    `;
                }

                html += `<div class="page" style="z-index: ${z}">
                            <div class="front">
                                <div class="page-text">${dataThiep[i].chuc}</div>
                                <div class="page-number" style="bottom: 8px;">${pageNumber}/10</div>
                            </div>
                            <div class="back">
                                ${backContent}
                            </div>
                        </div>`;
            }
            bookUI.innerHTML = html;
        }
        
        if (window.innerWidth > window.innerHeight) {
            buildBook();
        }

        // Bắn tim
        setTimeout(() => {
            if (window.innerHeight > window.innerWidth) {
                document.getElementById('rotateNotice').classList.add('show');
                return;
            }
            
            const cat = document.getElementById('cat');
            const target = document.getElementById('target');
            const scene1 = document.getElementById('scene-1');
            const scene2 = document.getElementById('scene-2');
            
            if (!cat || !target || !scene1 || !scene2) return;
            
            target.style.opacity = '1';
            
            const hInt = setInterval(() => {
                const catEl = document.querySelector('.cat-img');
                const targetEl = document.getElementById('target');
                
                if (!catEl || !targetEl) return;
                
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                
                const cr = catEl.getBoundingClientRect();
                const tr = targetEl.getBoundingClientRect();
                
                if (cr.width === 0 || tr.width === 0) return;
                
                const sx = cr.left + cr.width / 2;
                const sy = cr.top + cr.height / 4;
                
                const tx = (tr.left + Math.random() * tr.width) - sx;
                const ty = (tr.top + Math.random() * tr.height * 0.7) - sy;
                
                heart.style.left = sx + 'px';
                heart.style.top = sy + 'px';
                heart.style.setProperty('--tx', tx + 'px');
                heart.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 800);
            }, 120);
            
            setTimeout(() => {
                clearInterval(hInt);
                scene1.style.opacity = '0';
                setTimeout(() => {
                    scene1.style.display = 'none';
                    scene2.style.display = 'flex';
                    setTimeout(() => scene2.style.opacity = '1', 50);
                }, 500);
            }, 2500);
        }, 200);

        // Lật trang
        setTimeout(() => {
            if (window.innerHeight > window.innerWidth) return;
            
            const pages = document.querySelectorAll('.page');
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            
            if (!pages.length || !btnLeft || !btnRight) return;
            
            let currentPageIndex = 0;
            const totalPages = pages.length;

            function updateArrows() {
                btnLeft.style.display = currentPageIndex > 0 ? 'flex' : 'none';
                btnRight.style.display = currentPageIndex < totalPages ? 'flex' : 'none';
            }

            function flipNext() {
                if (currentPageIndex < totalPages) {
                    const p = pages[currentPageIndex];
                    p.classList.add('flipped');
                    p.style.zIndex = currentPageIndex + 1;
                    currentPageIndex++;
                    updateArrows();
                }
            }

            function flipBack() {
                if (currentPageIndex > 0) {
                    currentPageIndex--;
                    const p = pages[currentPageIndex];
                    p.classList.remove('flipped');
                    p.style.zIndex = 25 - currentPageIndex;
                    updateArrows();
                }
            }

            btnRight.onclick = (e) => {
                e.stopPropagation();
                flipNext();
            };
            
            btnLeft.onclick = (e) => {
                e.stopPropagation();
                flipBack();
            };
            
            pages.forEach((p) => {
                p.onclick = function(e) {
                    e.stopPropagation();
                    if(!this.classList.contains('flipped')) {
                        flipNext();
                    } else {
                        flipBack();
                    }
                };
            });

            updateArrows();
        }, 300);
    </script>
</body>
</html>
